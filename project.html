<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto - Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS resets and variables */
        :root {
            --bg-main: #131521;
            --bg-sidebar: #131521;
            --bg-card: #222333;
            --bg-input: #1a1c2d;
            --bg-hover: #1e2032;
            --text-primary: #f8f9fa;
            --text-secondary: #8e8f9f;
            --text-muted: #6b6d80;
            --accent-blue: #4f46e5;
            --border-color: #2a2d45;
            
            --tag-parcial-bg: rgba(37, 99, 235, 0.2);
            --tag-parcial-text: #60a5fa;
            --tag-pendente-bg: rgba(220, 38, 38, 0.2);
            --tag-pendente-text: #f87171;
            --tag-pago-bg: rgba(219, 39, 119, 0.2);
            --tag-pago-text: #f472b6;

            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }

        .menu-list {
            list-style: none;
            margin-bottom: 32px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .menu-item.active {
            background-color: var(--border-color);
            color: #6366f1;
        }

        .menu-item.active::before {
            content: '';
            position: absolute;
            left: -16px;
            height: 24px;
            width: 3px;
            background-color: #6366f1;
            border-radius: 0 4px 4px 0;
        }

        .menu-icon {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-list {
            list-style: none;
            flex-grow: 1;
            overflow-y: auto;
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .project-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .project-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 40px;
            background-color: #161825;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px 10px 40px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #6366f1;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
        }

        .top-actions {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-new-item {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-new-item:hover {
            opacity: 0.9;
        }

        .bell-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        /* Hero / Header Area */
        .header-area {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .project-title {
            font-size: 42px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .global-progress {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .progress-bar-container {
            flex-grow: 1;
            height: 6px;
            background-color: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--text-primary);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Hover Actions Wrapper */
        .card-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card-actions-hover {
            position: absolute;
            top: 0px;
            right: 16px;
            z-index: 1;
            display: flex;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform: translateY(10px); /* Hidden behind card */
            opacity: 0;
            pointer-events: none;
        }

        .card-wrapper:hover .card-actions-hover {
            transform: translateY(-20px);
            opacity: 1;
            pointer-events: all;
        }

        .action-btn-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .action-btn-circle:hover {
            transform: scale(1.1);
        }

        .action-btn-circle.edit-btn { background-color: #4f46e5; }
        .action-btn-circle.delete-btn { background-color: #ef4444; }

        .card {
            position: relative;
            z-index: 2;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border-color: #3f425e;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .card-financials {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 24px;
        }

        .money-total {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .money-balance {
            font-size: 18px;
            font-weight: 600;
        }

        .card-deadline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .card-progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card-progress-bar {
            flex-grow: 1;
            height: 4px;
            background-color: var(--bg-input);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .card-progress-fill {
            height: 100%;
            background-color: var(--text-primary);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background-color: var(--bg-input);
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .payment-method {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.2s;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-title {
            font-size: 20px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #6366f1;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .empty-state {
            grid-column: span 3;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }
        
        /* View Modal specific */
        .obs-content {
            background-color: var(--bg-input);
            padding: 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            min-height: 80px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div style="margin-bottom: 40px; padding: 0 12px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 6px;"></div>
                <span style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">Antigravity</span>
            </div>
        </div>

        <ul class="menu-list">
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                Search
            </li>
            <a href="index.html" class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                Dashboard
            </a>
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                Reports
            </li>
            <li class="menu-item active">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Projects
            </li>
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </li>
        </ul>

        <div class="section-title">
            RECENT PROJECTS
            <svg style="width: 14px; height: 14px; cursor: pointer; stroke: currentColor; stroke-width: 2; fill: none;" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
        </div>
        
        <ul class="project-list" id="sidebarProjectList">
            <!-- Rendered by JS -->
        </ul>

        <div class="menu-item" style="margin-top: auto; margin-bottom: 0;">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Help
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Top bar -->
        <header class="top-bar">
            <div style="display: flex; gap: 16px; align-items: center;">
                <a href="index.html" class="icon-btn" style="background-color: var(--bg-input); padding: 8px; border-radius: 8px; color: var(--text-primary); border: 1px solid var(--border-color);">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
            </div>

            <div class="search-container" style="margin-left: 20px;">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" class="search-input" placeholder="Search anything here...">
            </div>
            
            <div class="top-actions">
                <button class="btn-new-item" onclick="openModal()">
                    <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Item
                </button>
                <div class="bell-icon">
                    <svg style="width: 18px; height: 18px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
            </div>
        </header>

        <!-- Header area -->
        <div class="header-area">
            <h1 class="project-title" id="mainProjectTitle">Carregando...</h1>
            <div class="global-progress">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="globalProgressBar" style="width: 0%;"></div>
                </div>
                <span class="progress-text" id="globalProgressText">0%</span>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards will be rendered here by JS -->
        </div>

    </main>

    <!-- Modal for New/Edit Item -->
    <div class="modal-overlay" id="newItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="formModalTitle">Adicionar Item</h2>
            <form id="itemForm">
                <input type="hidden" id="p_id" value="">
                
                <div class="form-group">
                    <label>Nome do Item</label>
                    <input type="text" id="p_name" class="form-input" required placeholder="Ex: Cimento Portland">
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Custo Total (R$)</label>
                        <input type="number" id="p_valor" class="form-input" required placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Valor já Pago (R$)</label>
                        <input type="number" id="p_valorPago" class="form-input" required placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Prazo (Deadline)</label>
                        <input type="date" id="p_deadline" class="form-input" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Forma de Pagamento</label>
                        <select id="p_paymentMethod" class="form-input">
                            <option value="PIX">PIX</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Cartão">Cartão</option>
                            <option value="Boleto">Boleto</option>
                            <option value="Transferência">Transferência</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="p_badge" class="form-input">
                        <option value="Material">Material</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Mão de Obra">Mão de Obra</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Equipamento">Equipamento</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="p_observacoes" class="form-input" placeholder="Detalhes ou anotações..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Viewing Item Observations -->
    <div class="modal-overlay" id="viewItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="viewItemTitle">Detalhes do Item</h2>
            
            <div class="form-group">
                <label>Observações</label>
                <div id="viewItemObs" class="obs-content">Nenhuma observação informada.</div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-primary" onclick="closeViewModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // Data Migration / Initialization
        let projects_data = JSON.parse(localStorage.getItem('projects_data'));
        let items_data = JSON.parse(localStorage.getItem('items_data'));

        if (!projects_data || projects_data.length === 0) {
            projects_data = [
                { id: 1, name: "Projeto Maritmo", description: "Projeto de construção e arquitetura naval." }
            ];
            localStorage.setItem('projects_data', JSON.stringify(projects_data));
        }

        // Apply new schema to items
        if (!items_data || items_data.length === 0 || items_data[0].budget !== undefined) {
            items_data = [
                { id: 1, projectId: 1, name: "Fundação", observacoes: "Compra de cimento e ferro para a primeira fase.", valor: 11500, valorPago: 5000, deadline: "2026-02-05", badge: "Material", paymentMethod: "Transferência" },
                { id: 2, projectId: 1, name: "Caminhão Pipa", observacoes: "Aluguel de caminhão pipa para obra", valor: 2000, valorPago: 0, deadline: "2026-02-10", badge: "Transporte", paymentMethod: "Boleto" },
                { id: 3, projectId: 1, name: "Pedreiros", observacoes: "Pagamento equipe base", valor: 8000, valorPago: 8000, deadline: "2026-02-01", badge: "Mão de Obra", paymentMethod: "PIX" }
            ];
            localStorage.setItem('items_data', JSON.stringify(items_data));
        }

        // Routing
        const urlParams = new URLSearchParams(window.location.search);
        let currentProjectId = parseInt(urlParams.get('id'));

        if (!currentProjectId || !projects_data.find(p => p.id === currentProjectId)) {
            currentProjectId = projects_data[0].id;
        }

        const currentProject = projects_data.find(p => p.id === currentProjectId);
        let currentItems = items_data.filter(i => i.projectId === currentProjectId);

        document.getElementById('mainProjectTitle').innerText = currentProject.name;

        // Utilities
        const formatMoney = (val) => "R$ " + Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const formatDateBR = (dateString) => {
            if(!dateString) return "N/A";
            const parts = dateString.split('-');
            if(parts.length === 3) {
                return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`; // dd/mm/yy
            }
            return dateString;
        };

        const calculateStatus = (valor, pago) => {
            if (pago === 0) return 'Pendente';
            if (pago > 0 && pago < valor) return 'Parcial';
            return 'Pago';
        };

        const getStatusStyles = (status) => {
            if (status === 'Parcial') return `background-color: var(--tag-parcial-bg); color: var(--tag-parcial-text);`;
            if (status === 'Pendente') return `background-color: var(--tag-pendente-bg); color: var(--tag-pendente-text);`;
            if (status === 'Pago') return `background-color: var(--tag-pago-bg); color: var(--tag-pago-text);`;
            return `background-color: #333; color: #fff;`;
        };

        const getBadgeStyles = (badge) => {
            if (badge === 'Material') return { dot: '#f59e0b', color: '#f59e0b' };
            if (badge === 'Transporte') return { dot: '#ec4899', color: '#ec4899' };
            if (badge === 'Mão de Obra') return { dot: '#22c55e', color: '#22c55e' };
            if (badge === 'Alimentação') return { dot: '#a855f7', color: '#a855f7' }; // purple
            if (badge === 'Equipamento') return { dot: '#06b6d4', color: '#06b6d4' }; // cyan
            return { dot: '#fff', color: '#fff' };
        };

        function saveItems() {
            localStorage.setItem('items_data', JSON.stringify(items_data));
            currentItems = items_data.filter(i => i.projectId === currentProjectId);
            updateGlobalProgress();
            renderSidebar();
        }

        function updateGlobalProgress() {
            const pItems = items_data.filter(i => i.projectId === currentProjectId);
            let totalValue = 0;
            let paidValue = 0;
            
            pItems.forEach(item => {
                totalValue += parseFloat(item.valor) || 0;
                paidValue += parseFloat(item.valorPago) || 0;
            });
            
            const progress = totalValue === 0 ? 0 : Math.round((paidValue / totalValue) * 100);
            document.getElementById('globalProgressBar').style.width = progress + '%';
            document.getElementById('globalProgressText').innerText = progress + '%';
        }

        function renderSidebar() {
            const projectsWithStats = projects_data.map(p => {
                const pItems = items_data.filter(i => i.projectId === p.id);
                let closestDeadline = Infinity;
                pItems.forEach(item => {
                    const status = calculateStatus(parseFloat(item.valor), parseFloat(item.valorPago));
                    if (status !== 'Pago') {
                        const dl = new Date(item.deadline).getTime();
                        if (dl < closestDeadline) closestDeadline = dl;
                    }
                });
                return { ...p, closestDeadline };
            });
            
            projectsWithStats.sort((a, b) => a.closestDeadline - b.closestDeadline);
            
            const sidebarList = document.getElementById('sidebarProjectList');
            sidebarList.innerHTML = '';
            
            const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];
            
            projectsWithStats.forEach((p, index) => {
                const pItemsCount = items_data.filter(i => i.projectId === p.id).length;
                const color = colors[index % colors.length];
                const isActive = p.id === currentProjectId ? 'background-color: var(--bg-hover); color: var(--text-primary);' : '';
                
                sidebarList.insertAdjacentHTML('beforeend', `
                    <li class="project-item" style="${isActive}" onclick="window.location.href='project.html?id=${p.id}'">
                        <div style="display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px;">
                            <div class="project-color" style="background-color: ${color}; flex-shrink: 0;"></div>
                            ${p.name}
                        </div>
                        <span style="font-size: 11px; display: flex; align-items: center; gap: 4px; flex-shrink: 0;">
                            <svg style="width: 12px; height: 12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m0-16l-4 4m4-4l4 4"></path></svg>
                            ${pItemsCount}
                        </span>
                    </li>
                `);
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            if (currentItems.length === 0) {
                container.innerHTML = `<div class="empty-state">Nenhum item encontrado neste projeto.</div>`;
                return;
            }

            currentItems.forEach(item => {
                const badgeStyles = getBadgeStyles(item.badge);
                const valor = parseFloat(item.valor) || 0;
                const valorPago = parseFloat(item.valorPago) || 0;
                
                const status = calculateStatus(valor, valorPago);
                const progressPercent = valor === 0 ? 0 : Math.min(100, Math.round((valorPago / valor) * 100));

                const isFullyPaid = status === 'Pago';
                const statusColor = isFullyPaid ? '#22c55e' : (status === 'Parcial' ? '#60a5fa' : '#f87171');

                const cardHTML = `
                    <div class="card-wrapper">
                        <!-- Floating Actions (Hover) -->
                        <div class="card-actions-hover">
                            <button class="action-btn-circle edit-btn" onclick="editItem(${item.id})" title="Editar Item">
                                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button class="action-btn-circle delete-btn" onclick="deleteItem(${item.id})" title="Excluir Item">
                                <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>

                        <!-- Card View -->
                        <div class="card" onclick="viewItem(${item.id})">
                            <div class="card-header">
                                <h3 class="card-title">${item.name}</h3>
                                <span class="tag" style="${getStatusStyles(status)}">${status}</span>
                            </div>
                            
                            <div class="card-financials">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                    <div class="money-total">Custo: ${formatMoney(valor)}</div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div class="money-total">Pago:</div>
                                    <div class="money-balance" style="color: ${statusColor}">${formatMoney(valorPago)}</div>
                                </div>
                            </div>

                            <div class="card-deadline">
                                <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                Prazo: ${formatDateBR(item.deadline)}
                            </div>

                            <div class="card-progress-row">
                                <div class="card-progress-bar">
                                    <div class="card-progress-fill" style="width: ${progressPercent}%;"></div>
                                </div>
                                <span style="font-size: 12px; font-weight: 600;">${progressPercent}%</span>
                            </div>

                            <div class="card-footer">
                                <div class="payment-method">
                                    <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    ${item.paymentMethod || 'N/A'}
                                </div>

                                <div class="badge" style="color: ${badgeStyles.color}">
                                    <div class="badge-dot" style="background-color: ${badgeStyles.dot}"></div>
                                    ${item.badge}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // View Modal Function
        const viewModal = document.getElementById('viewItemModal');
        
        function viewItem(id) {
            const item = currentItems.find(i => i.id === id);
            if(item) {
                document.getElementById('viewItemTitle').innerText = item.name;
                document.getElementById('viewItemObs').innerText = item.observacoes || 'Nenhuma observação informada.';
                viewModal.classList.add('active');
            }
        }

        function closeViewModal() {
            viewModal.classList.remove('active');
        }

        // Form Modal Functions
        const modal = document.getElementById('newItemModal');
        const form = document.getElementById('itemForm');

        function openModal() {
            document.getElementById('formModalTitle').innerText = "Adicionar Item";
            document.getElementById('p_id').value = "";
            document.getElementById('p_deadline').valueAsDate = new Date();
            modal.classList.add('active');
        }

        function editItem(id) {
            const item = currentItems.find(i => i.id === id);
            if(item) {
                document.getElementById('formModalTitle').innerText = "Editar Item";
                document.getElementById('p_id').value = item.id;
                document.getElementById('p_name').value = item.name;
                document.getElementById('p_valor').value = item.valor;
                document.getElementById('p_valorPago').value = item.valorPago;
                document.getElementById('p_deadline').value = item.deadline;
                document.getElementById('p_paymentMethod').value = item.paymentMethod || 'Dinheiro';
                document.getElementById('p_badge').value = item.badge;
                document.getElementById('p_observacoes').value = item.observacoes || '';
                modal.classList.add('active');
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const pId = document.getElementById('p_id').value;
            
            const newItemData = {
                projectId: currentProjectId,
                name: document.getElementById('p_name').value,
                valor: parseFloat(document.getElementById('p_valor').value) || 0,
                valorPago: parseFloat(document.getElementById('p_valorPago').value) || 0,
                deadline: document.getElementById('p_deadline').value,
                paymentMethod: document.getElementById('p_paymentMethod').value,
                badge: document.getElementById('p_badge').value,
                observacoes: document.getElementById('p_observacoes').value
            };

            if (pId) {
                // Edit
                const index = items_data.findIndex(i => i.id === parseInt(pId));
                if(index > -1) {
                    items_data[index] = { ...items_data[index], ...newItemData };
                }
            } else {
                // Create
                newItemData.id = Date.now();
                items_data.push(newItemData);
            }

            saveItems();
            renderCards();
            closeModal();
        });

        function deleteItem(id) {
            if(confirm("Tem certeza que deseja excluir este item?")) {
                items_data = items_data.filter(i => i.id !== id);
                saveItems();
                renderCards();
            }
        }

        // Initial Render
        updateGlobalProgress();
        renderSidebar();
        renderCards();

    </script>
</body>
</html>
