<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto - Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div style="margin-bottom: 40px; padding: 0 12px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 6px;"></div>
                <span style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">Antigravity</span>
            </div>
        </div>

        <ul class="menu-list">
            <a href="index.html" class="menu-item active">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Projects
            </a>
        </ul>

        <div class="section-title">
            PROJETOS RECENTES
            <svg onclick="openNewProjectModal()" style="width: 14px; height: 14px; cursor: pointer; stroke: currentColor; stroke-width: 2; fill: none;" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
        </div>
        
        <ul class="project-list" id="sidebarProjectList">
            <!-- Rendered by JS -->
        </ul>

    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Top bar -->
        <header class="top-bar">
            <div style="display: flex; gap: 16px; align-items: center;">
                <a href="index.html" class="icon-btn" style="background-color: var(--bg-input); padding: 8px; border-radius: 8px; color: var(--text-primary); border: 1px solid var(--border-color);">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
            </div>

            <div class="search-filter-wrapper" style="margin-left: 20px;">
                <div class="search-compound">
                    <svg class="search-icon-compound" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <div class="search-chips-area" id="searchChipsArea">
                        <!-- Chips rendered by JS -->
                        <input type="text" class="search-input-inline" id="searchInput" placeholder="Pesquisar itens...">
                    </div>
                    <button class="filter-toggle-btn" id="filterToggleBtn" type="button" title="Filtros">
                        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    </button>
                </div>

                <!-- Autocomplete Suggestions -->
                <div class="autocomplete-dropdown" id="autocompleteDropdown">
                    <!-- Suggestions rendered by JS -->
                </div>

                <!-- Filter Dropdown -->
                <div class="filter-dropdown" id="filterDropdown">
                    <div class="filter-column">
                        <span class="filter-column-title">Categoria</span>
                        <button class="filter-option" data-type="badge" data-value="Material" type="button">Material</button>
                        <button class="filter-option" data-type="badge" data-value="Transporte" type="button">Transporte</button>
                        <button class="filter-option" data-type="badge" data-value="Mão de Obra" type="button">Mão de Obra</button>
                        <button class="filter-option" data-type="badge" data-value="Alimentação" type="button">Alimentação</button>
                        <button class="filter-option" data-type="badge" data-value="Equipamento" type="button">Equipamento</button>
                    </div>
                    <div class="filter-column">
                        <span class="filter-column-title">Pagamento</span>
                        <button class="filter-option" data-type="paymentMethod" data-value="PIX" type="button">PIX</button>
                        <button class="filter-option" data-type="paymentMethod" data-value="Dinheiro" type="button">Dinheiro</button>
                        <button class="filter-option" data-type="paymentMethod" data-value="Cartão" type="button">Cartão</button>
                        <button class="filter-option" data-type="paymentMethod" data-value="Boleto" type="button">Boleto</button>
                        <button class="filter-option" data-type="paymentMethod" data-value="Transferência" type="button">Transferência</button>
                    </div>
                    <div class="filter-column">
                        <span class="filter-column-title">Status</span>
                        <button class="filter-option" data-type="status" data-value="Pendente" type="button">Pendente</button>
                        <button class="filter-option" data-type="status" data-value="Parcial" type="button">Parcial</button>
                        <button class="filter-option" data-type="status" data-value="Pago" type="button">Pago</button>
                    </div>
                    <div class="filter-column">
                        <span class="filter-column-title">Prazo</span>
                        <button class="filter-option" data-type="atrasado" data-value="true" type="button">Atrasado</button>
                        <button class="filter-option" data-type="atrasado" data-value="false" type="button">Em dia</button>
                    </div>
                </div>
            </div>
            
            <div class="top-actions">
                <button class="btn-new-item" onclick="openModal()">
                    <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Item
                </button>
                <div class="bell-icon">
                    <svg style="width: 18px; height: 18px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
            </div>
        </header>

        <!-- Header area -->
        <div class="header-area">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; margin-bottom: 24px;">
                <h1 class="project-title" id="mainProjectTitle" style="margin-bottom: 0;">Carregando...</h1>
                <div class="header-stats-panel" id="headerStatsPanel">
                    <!-- Rendered by JS -->
                </div>
            </div>
            <div class="global-progress">
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar-fill" id="globalProgressBar" style="width: 0%;"></div>
                </div>
                <span class="progress-text" id="globalProgressText">0%</span>
                <div class="progress-tooltip" id="progressTooltip"></div>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards will be rendered here by JS -->
        </div>

    </main>

    <!-- Modal for New/Edit Item -->
    <div class="modal-overlay" id="newItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="formModalTitle">Adicionar Item</h2>
            <form id="itemForm">
                <input type="hidden" id="p_id" value="">
                
                <div class="form-group">
                    <label>Nome do Item</label>
                    <input type="text" id="p_name" class="form-input" required placeholder="Ex: Cimento Portland">
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label id="p_valor_label">Custo Total (R$)</label>
                        <input type="number" id="p_valor" class="form-input" required placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label id="p_valorPago_label">Valor já Pago (R$)</label>
                        <input type="number" id="p_valorPago" class="form-input" required placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Prazo (Deadline)</label>
                        <input type="date" id="p_deadline" class="form-input" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Forma de Pagamento</label>
                        <select id="p_paymentMethod" class="form-input">
                            <option value="PIX">PIX</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Cartão">Cartão</option>
                            <option value="Boleto">Boleto</option>
                            <option value="Transferência">Transferência</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="p_badge" class="form-input">
                        <option value="Material">Material</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Mão de Obra">Mão de Obra</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Equipamento">Equipamento</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="p_observacoes" class="form-input" placeholder="Detalhes ou anotações..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Viewing Item Observations -->
    <div class="modal-overlay" id="viewItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="viewItemTitle">Detalhes do Item</h2>
            
            <div class="form-group">
                <label>Observações</label>
                <div id="viewItemObs" class="obs-content">Nenhuma observação informada.</div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-primary" onclick="closeViewModal()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modal for New Project (from sidebar +) -->
    <div class="modal-overlay" id="newProjectModal">
        <div class="modal-content">
            <h2 class="modal-title">Novo Projeto</h2>
            <form id="newProjectForm">
                <div class="form-group">
                    <label>Nome do Projeto</label>
                    <input type="text" id="np_name" class="form-input" required placeholder="Ex: Construção Setor Sul">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="np_desc" class="form-input" rows="4" required placeholder="Detalhes do projeto..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeNewProjectModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Criar Projeto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/currency.js"></script>
    <script src="js/project.js"></script>
</body>
</html>
