<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div style="margin-bottom: 40px; padding: 0 12px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 6px;"></div>
                <span style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">Antigravity</span>
            </div>
        </div>

        <ul class="menu-list">
            <a href="index.html" class="menu-item active">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Projects
            </a>
            <a href="settings.html" class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </ul>

        <div class="section-title">
            PROJETOS RECENTES
            <svg onclick="openModal()" style="width: 14px; height: 14px; cursor: pointer; stroke: currentColor; stroke-width: 2; fill: none;" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
        </div>
        
        <ul class="project-list" id="sidebarProjectList">
            <!-- Rendered by JS -->
        </ul>

    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Top bar -->
        <header class="top-bar">
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn-new-item" onclick="openModal()">
                    <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Project
                </button>
                <div class="bell-icon">
                    <svg style="width: 18px; height: 18px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
            </div>
        </header>

        <!-- Header area -->
        <div class="header-area">
            <h1 class="project-title">Visão Geral dos Projetos</h1>
            <p class="project-subtitle">Selecione um projeto para gerenciar seus itens e finanças.</p>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards will be rendered here by JS -->
        </div>

    </main>

    <!-- Modal for New Project -->
    <div class="modal-overlay" id="newItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Create New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="p_id" value="">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="p_name" class="form-input" required placeholder="e.g. Construção Setor Sul">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p_desc" class="form-input" rows="4" required placeholder="Project details..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/currency.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
