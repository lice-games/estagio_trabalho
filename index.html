<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS resets and variables */
        :root {
            --bg-main: #131521;
            --bg-sidebar: #131521;
            --bg-card: #222333;
            --bg-input: #1a1c2d;
            --bg-hover: #1e2032;
            --text-primary: #f8f9fa;
            --text-secondary: #8e8f9f;
            --text-muted: #6b6d80;
            --accent-blue: #4f46e5;
            --border-color: #2a2d45;
            
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }

        .menu-list {
            list-style: none;
            margin-bottom: 32px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .menu-item.active {
            background-color: var(--border-color);
            color: #6366f1;
        }

        .menu-item.active::before {
            content: '';
            position: absolute;
            left: -16px;
            height: 24px;
            width: 3px;
            background-color: #6366f1;
            border-radius: 0 4px 4px 0;
        }

        .menu-icon {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-list {
            list-style: none;
            flex-grow: 1;
            overflow-y: auto;
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .project-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .project-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 40px;
            background-color: #161825;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px 10px 40px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #6366f1;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
        }

        .top-actions {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-new-item {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-new-item:hover {
            opacity: 0.9;
        }

        .bell-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        /* Hero / Header Area */
        .header-area {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .project-title {
            font-size: 42px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .project-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 16px;
            margin-bottom: 40px;
        }

        /* New Card Styles with Proportional Layout */
        .card-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card-actions-hover {
            position: absolute;
            top: 0px;
            right: 16px;
            z-index: 1;
            display: flex;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform: translateY(10px); /* Hidden behind card initially */
            opacity: 0;
            pointer-events: none; /* Disable click when hidden */
        }

        .card-wrapper:hover .card-actions-hover {
            transform: translateY(-20px); /* Move upwards to become visible */
            opacity: 1;
            pointer-events: all;
        }

        .action-btn-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .action-btn-circle:hover {
            transform: scale(1.1);
        }

        .action-btn-circle.edit-btn { background-color: #4f46e5; }
        .action-btn-circle.delete-btn { background-color: #ef4444; }

        .card {
            position: relative;
            z-index: 2; /* keep card above the resting buttons */
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            min-height: 240px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            border-color: #3f425e;
        }

        .card-title-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
            flex-grow: 1; /* Pushes the rest to the bottom */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-financials {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            background-color: var(--bg-input);
            padding: 12px;
            border-radius: 8px;
        }

        .financial-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .financial-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .financial-value {
            font-size: 13px;
            font-weight: 600;
        }

        .card-deadline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        
        .deadline-highlight {
            color: #ef4444; /* red for closest deadline */
            font-weight: 600;
        }

        .card-progress-section {
            margin-top: auto;
        }

        .card-progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .card-progress-bar {
            height: 6px;
            background-color: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .card-progress-fill {
            height: 100%;
            background-color: var(--text-primary);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.2s;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-title {
            font-size: 20px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #6366f1;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .empty-state {
            grid-column: span 4;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div style="margin-bottom: 40px; padding: 0 12px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 6px;"></div>
                <span style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">Antigravity</span>
            </div>
        </div>

        <ul class="menu-list">
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                Search
            </li>
            <a href="index.html" class="menu-item active">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                Dashboard
            </a>
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                Reports
            </li>
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Projects
            </li>
            <li class="menu-item">
                <svg class="menu-icon" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </li>
        </ul>

        <div class="section-title">
            RECENT PROJECTS
            <svg style="width: 14px; height: 14px; cursor: pointer; stroke: currentColor; stroke-width: 2; fill: none;" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
        </div>
        
        <ul class="project-list" id="sidebarProjectList">
            <!-- Rendered by JS -->
        </ul>

        <div class="menu-item" style="margin-top: auto; margin-bottom: 0;">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Help
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Top bar -->
        <header class="top-bar">
            <div class="search-container">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" class="search-input" placeholder="Search anything here...">
            </div>
            
            <div class="top-actions">
                <button class="btn-new-item" onclick="openModal()">
                    <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Project
                </button>
                <div class="bell-icon">
                    <svg style="width: 18px; height: 18px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
            </div>
        </header>

        <!-- Header area -->
        <div class="header-area">
            <h1 class="project-title">Visão Geral dos Projetos</h1>
            <p class="project-subtitle">Selecione um projeto para gerenciar seus itens e finanças.</p>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards will be rendered here by JS -->
        </div>

    </main>

    <!-- Modal for New Project -->
    <div class="modal-overlay" id="newItemModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Create New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="p_id" value="">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="p_name" class="form-input" required placeholder="e.g. Construção Setor Sul">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p_desc" class="form-input" rows="4" required placeholder="Project details..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data Migration / Initialization
        let projects_data = JSON.parse(localStorage.getItem('projects_data'));
        let items_data = JSON.parse(localStorage.getItem('items_data'));

        if (!projects_data || projects_data.length === 0) {
            projects_data = [
                { id: 1, name: "Projeto Maritmo", description: "Projeto de construção e arquitetura naval." },
                { id: 2, name: "Project Catalyst", description: "Plataforma de inovação e pesquisa." },
                { id: 3, name: "Project Zen", description: "Iniciativas de bem-estar corporativo." },
                { id: 4, name: "Quantum Spark", description: "Pesquisa em novas tecnologias quânticas." }
            ];
            localStorage.setItem('projects_data', JSON.stringify(projects_data));
        }

        // Migrate items_data to new format (valor, valorPago, paymentMethod, observacoes) if needed
        if (!items_data || items_data.length === 0 || items_data[0].budget !== undefined) {
            items_data = [
                { id: 1, projectId: 1, name: "Fundação", observacoes: "Compra de cimento e ferro", valor: 11500, valorPago: 5000, deadline: "2026-02-05", badge: "Material", paymentMethod: "Transferência" },
                { id: 2, projectId: 1, name: "Caminhão Pipa", observacoes: "Aluguel de caminhão pipa para obra", valor: 2000, valorPago: 0, deadline: "2026-02-10", badge: "Transporte", paymentMethod: "Boleto" },
                { id: 3, projectId: 1, name: "Pedreiros", observacoes: "Pagamento equipe base", valor: 8000, valorPago: 8000, deadline: "2026-02-01", badge: "Mão de Obra", paymentMethod: "PIX" }
            ];
            localStorage.setItem('items_data', JSON.stringify(items_data));
        }

        // Utilities
        const formatMoney = (val) => "R$ " + Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const formatDateBR = (dateString) => {
            if(!dateString) return "N/A";
            const parts = dateString.split('-');
            if(parts.length === 3) {
                return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`; // dd/mm/yy
            }
            return dateString;
        };

        function saveProjects() {
            localStorage.setItem('projects_data', JSON.stringify(projects_data));
            renderSidebar();
            renderCards();
        }

        function getProjectStats(projectId) {
            const pItems = items_data.filter(i => i.projectId === projectId);
            let totalValue = 0;
            let paidValue = 0;
            let closestDeadline = Infinity;
            let unpaidItemName = "Sem pendências";

            pItems.forEach(item => {
                const val = parseFloat(item.valor) || 0;
                const paid = parseFloat(item.valorPago) || 0;
                
                totalValue += val;
                paidValue += paid;

                // Any item not fully paid is considered pending/partial for deadline calculation
                if (paid < val) {
                    const itemDeadline = new Date(item.deadline).getTime();
                    if (itemDeadline < closestDeadline) {
                        closestDeadline = itemDeadline;
                        unpaidItemName = formatDateBR(item.deadline);
                    }
                }
            });

            const progress = totalValue === 0 ? 0 : Math.round((paidValue / totalValue) * 100);
            const devendo = totalValue - paidValue;
            
            return {
                progress,
                totalValue,
                devendo,
                closestDeadline,
                unpaidItemName: closestDeadline === Infinity ? "N/A" : unpaidItemName,
                isUrgent: closestDeadline !== Infinity && (closestDeadline - Date.now() < 7 * 24 * 60 * 60 * 1000) // less than 7 days
            };
        }

        function renderSidebar() {
            const projectsWithStats = projects_data.map(p => ({ ...p, stats: getProjectStats(p.id) }));
            projectsWithStats.sort((a, b) => a.stats.closestDeadline - b.stats.closestDeadline);
            
            const sidebarList = document.getElementById('sidebarProjectList');
            sidebarList.innerHTML = '';
            
            const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];
            
            projectsWithStats.forEach((p, index) => {
                const pItemsCount = items_data.filter(i => i.projectId === p.id).length;
                const color = colors[index % colors.length];
                
                sidebarList.insertAdjacentHTML('beforeend', `
                    <li class="project-item" onclick="window.location.href='project.html?id=${p.id}'">
                        <div style="display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px;">
                            <div class="project-color" style="background-color: ${color}; flex-shrink: 0;"></div>
                            ${p.name}
                        </div>
                        <span style="font-size: 11px; display: flex; align-items: center; gap: 4px; flex-shrink: 0;">
                            <svg style="width: 12px; height: 12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m0-16l-4 4m4-4l4 4"></path></svg>
                            ${pItemsCount}
                        </span>
                    </li>
                `);
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            if (projects_data.length === 0) {
                container.innerHTML = `<div class="empty-state">No projects found. Click "New Project" to create one.</div>`;
                return;
            }

            const projectsWithStats = projects_data.map(p => ({ ...p, stats: getProjectStats(p.id) }));
            projectsWithStats.sort((a, b) => a.stats.closestDeadline - b.stats.closestDeadline);

            projectsWithStats.forEach(p => {
                const cardHTML = `
                    <div class="card-wrapper">
                        <!-- Botões Flutuantes Animados (Atrás do Card) -->
                        <div class="card-actions-hover">
                            <button class="action-btn-circle edit-btn" onclick="editProject(${p.id})" title="Editar Projeto">
                                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button class="action-btn-circle delete-btn" onclick="deleteProject(${p.id})" title="Excluir Projeto">
                                <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>

                        <!-- Card Principal -->
                        <div class="card" onclick="window.location.href='project.html?id=${p.id}'">
                            <h3 class="card-title-text">${p.name}</h3>
                            <p class="card-desc-text">${p.description}</p>
                            
                            <div class="card-financials">
                                <div class="financial-row">
                                    <span class="financial-label">Custo Total:</span>
                                    <span class="financial-value" style="color: var(--text-primary);">${formatMoney(p.stats.totalValue)}</span>
                                </div>
                                <div class="financial-row">
                                    <span class="financial-label">Falta Pagar:</span>
                                    <span class="financial-value" style="color: #ef4444;">${formatMoney(p.stats.devendo)}</span>
                                </div>
                            </div>
                            
                            <div class="card-deadline">
                                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Próximo Vencimento: 
                                <span class="${p.stats.isUrgent ? 'deadline-highlight' : ''}" style="margin-left:4px;">
                                    ${p.stats.unpaidItemName}
                                </span>
                            </div>

                            <div class="card-progress-section">
                                <div class="card-progress-header">
                                    <span>Progresso Financeiro</span>
                                    <span style="font-weight: 600;">${p.stats.progress}%</span>
                                </div>
                                <div class="card-progress-bar">
                                    <div class="card-progress-fill" style="width: ${p.stats.progress}%;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Modal Functions
        const modal = document.getElementById('newItemModal');
        const form = document.getElementById('projectForm');

        function openModal() {
            document.getElementById('modalTitle').innerText = "Create New Project";
            document.getElementById('p_id').value = "";
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
        }

        function editProject(id) {
            const p = projects_data.find(proj => proj.id === id);
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit Project";
                document.getElementById('p_id').value = p.id;
                document.getElementById('p_name').value = p.name;
                document.getElementById('p_desc').value = p.description;
                modal.classList.add('active');
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const pId = document.getElementById('p_id').value;
            
            if (pId) {
                // Edit existing
                const pIndex = projects_data.findIndex(p => p.id === parseInt(pId));
                if(pIndex > -1) {
                    projects_data[pIndex].name = document.getElementById('p_name').value;
                    projects_data[pIndex].description = document.getElementById('p_desc').value;
                }
            } else {
                // Create new
                const newProject = {
                    id: Date.now(),
                    name: document.getElementById('p_name').value,
                    description: document.getElementById('p_desc').value
                };
                projects_data.push(newProject);
            }

            saveProjects();
            closeModal();
        });

        function deleteProject(id) {
            if(confirm("Deseja realmente excluir este projeto e todos os seus itens?")) {
                projects_data = projects_data.filter(p => p.id !== id);
                items_data = items_data.filter(i => i.projectId !== id);
                localStorage.setItem('items_data', JSON.stringify(items_data));
                saveProjects();
            }
        }

        // Initial Render
        renderSidebar();
        renderCards();

    </script>
</body>
</html>
